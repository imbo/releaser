name: Validate pull request
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: composer install --no-dev
      - run: scripts/conventional-commit-msg.php "${{ github.event.pull_request.title }}"
  tests-and-qa:
    name: composer run ${{ matrix.composer-script }} / PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.3"
          - "8.4"
          - "8.5"
        composer-script:
          - sa
          - test
          - cs
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - id: composer-cache-dir
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - id: composer-cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
      - run: composer validate --strict
      - run: composer install
      - run: composer run ${{ matrix.composer-script }}
  branch-protection:
    needs:
      - validate-pr-title
      - tests-and-qa
    if: ${{ always() }}
    runs-on: ubuntu-latest
    name: Branch protection
    steps:
      - if: ${{ needs.validate-pr-title.result != 'success' || needs.tests-and-qa.result != 'success'}}
        run: exit 1
      - run: echo "All checks passed."
