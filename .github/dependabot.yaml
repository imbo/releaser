version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    open-pull-requests-limit: 1
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    open-pull-requests-limit: 1
    groups:
      symfony:
        patterns:
          - "symfony/*"
      phpstan:
        patterns:
          - "phpstan/*"
